<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Art Portfolio</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;

    background: radial-gradient(circle at center,
        #2a2a2a 0%,
        #141414 60%,
        #000000 100%
    );

    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;

    overflow: hidden;
}


body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;

    width: 100%;
    height: 100%;

    background: url("imagee.jpg") center/cover no-repeat;

    opacity: 0.25; 
    z-index: -1;
}


body::after {
    content: "";
    position: fixed;
    width: 600px;
    height: 600px;

    background: radial-gradient(circle,
        rgba(255,255,255,0.15),
        transparent 70%
    );

    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    z-index: 0;
}


.card {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);

    padding: 50px 40px;   
    border-radius: 30px;

    width: 60%;           
    max-width: 500px;     

    text-align: center;

    box-shadow: 0 20px 40px rgba(0,0,0,0.5);

    color: white;

    z-index: 1;
}

.card h1 {
    font-size: 40px;
    margin-bottom: 10px;
    letter-spacing: 1px;
}

.card p {
    margin-bottom: 25px;
    opacity: 0.7;
    font-size: 18px;
}


.btn-container {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.btn {
    padding: 12px 18px;
    border-radius: 50px;

    background: rgba(255, 255, 255, 0.15);
    color: white;

    text-decoration: none;
    font-weight: bold;

    border: 1px solid rgba(255,255,255,0.2);

    box-shadow: 0 5px 15px rgba(0,0,0,0.3);

    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.08);
    background: rgba(255,255,255,0.3);
}
</style>
</head>

<body>

<div class="card">
    <h1>History of Technology</h1>
    <p>From stone tools to smart worlds</p>
    <p>Submitted by: ART 002 GROUP 3</p>

    <div class="btn-container">
        <a href="intro.html" class="btn">Introduction</a>
        <a href="gallery.html" class="btn">Enter Museum</a>
    </div>
</div>

</body>
</html>
